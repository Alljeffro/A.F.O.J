<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.F.O.J - Battle Arena</title>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: white; }
        canvas { display: block; margin: 0 auto; background: #1e293b; }
        
        /* Interfaces UI Overlay */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.95); z-index: 10; }
        h1 { font-size: 48px; margin-bottom: 10px; letter-spacing: 4px; color: #38bdf8; text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        /* Grille des Skins */
        .skin-selector { display: flex; gap: 15px; margin-bottom: 40px; }
        .skin-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: transform 0.2s, border-color 0.2s; }
        .skin-option:hover { transform: scale(1.1); }
        .skin-option.selected { border-color: #ffffff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.6); }

        /* Boutons */
        .btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background: #0284c7; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .btn:hover { background: #0369a1; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* HUD en jeu */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: none; pointer-events: none; line-height: 1.6; }
        #hud span { color: #38bdf8; }
        #hp-bar-container { width: 200px; height: 15px; background: #475569; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 2px solid #0f172a; }
        #hp-bar { width: 100%; height: 100%; background: #22c55e; transition: width 0.1s; }
        #zone-timer { color: #f43f5e !important; }

        /* Écran Game Over */
        #gameOverScreen { display: none; }
        #deathMessage { color: #94a3b8; margin-bottom: 20px; font-style: italic; }
    </style>
</head>
<body>

    <!-- HUD en jeu -->
    <div id="hud">
        A.F.O.J | Éliminations: <span id="score">0</span><br>
        Zone : <span id="zone-timer">Stable</span>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
    </div>

    <!-- Menu Principal -->
    <div id="mainMenu" class="overlay">
        <h1>A.F.O.J</h1>
        <p>Sélectionne ton Skin et rejoins l'arène</p>
        
        <div class="skin-selector">
            <div class="skin-option selected" style="background: #38bdf8;" data-color="#38bdf8"></div>
            <div class="skin-option" style="background: #ec4899;" data-color="#ec4899"></div>
            <div class="skin-option" style="background: #22c55e;" data-color="#22c55e"></div>
            <div class="skin-option" style="background: #eab308;" data-color="#eab308"></div>
            <div class="skin-option" style="background: #a855f7;" data-color="#a855f7"></div>
        </div>

        <button class="btn" id="startBtn">LANCER LA PARTIE</button>
    </div>

    <!-- Écran Game Over -->
    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);">ELIMINÉ</h1>
        <p id="deathMessage">Tu n'as pas survécu.</p>
        <h2 style="margin-bottom: 40px;">Score final : <span id="finalScore" style="color: #eab308;">0</span></h2>
        <button class="btn" id="restartBtn">REJOUER</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameState = 'MENU';
        let score = 0;
        let spawnInterval = null;
        let zoneInterval = null;

        // Le Joueur
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#38bdf8',
            speed: 4,
            hp: 100,
            maxHp: 100
        };

        // La Zone de Sécurité (Battle Royale)
        const zone = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            currentRadius: Math.max(canvas.width, canvas.height) * 0.8,
            targetRadius: Math.max(canvas.width, canvas.height) * 0.8,
            shrinkSpeed: 0.5,
            isShrinking: false,
            timer: 15 // Temps avant rétrécissement
        };

        let bullets = [];
        let enemies = [];

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        const skinOptions = document.querySelectorAll('.skin-option');
        skinOptions.forEach(option => {
            option.addEventListener('click', () => {
                skinOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                player.color = option.getAttribute('data-color');
            });
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', returnToMenu);

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            score = 0;
            player.hp = 100;
            document.getElementById('score').innerText = score;
            document.getElementById('hp-bar').style.width = '100%';
            document.getElementById('hp-bar').style.background = '#22c55e';
            
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;

            // Réinitialisation Zone
            zone.currentRadius = Math.max(canvas.width, canvas.height) * 0.6;
            zone.targetRadius = zone.currentRadius;
            zone.timer = 15;
            zone.isShrinking = false;
            document.getElementById('zone-timer').innerText = "Rétrécit dans " + zone.timer + "s";

            gameState = 'PLAYING';

            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEnemy, 1000);

            if (zoneInterval) clearInterval(zoneInterval);
            zoneInterval = setInterval(manageZoneTimer, 1000);
        }

        function returnToMenu() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            gameState = 'MENU';
        }

        function manageZoneTimer() {
            if (gameState !== 'PLAYING') return;
            
            if (!zone.isShrinking) {
                zone.timer--;
                document.getElementById('zone-timer').innerText = "Rétrécit dans " + zone.timer + "s";
                if (zone.timer <= 0) {
                    zone.isShrinking = true;
                    zone.targetRadius = zone.currentRadius * 0.6; // Réduit la zone de 40%
                    document.getElementById('zone-timer').innerText = "⚠️ DANGER ! RETRECISSEMENT";
                }
            }
        }

        function triggerGameOver(reason) {
            gameState = 'GAMEOVER';
            clearInterval(spawnInterval);
            clearInterval(zoneInterval);
            document.getElementById('hud').style.display = 'none';
            document.getElementById('finalScore').innerText = score;
            document.getElementById('deathMessage').innerText = reason;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function shoot(targetX, targetY) {
            if (gameState !== 'PLAYING') return;
            const angle = Math.atan2(targetY - player.y, targetX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                radius: 4,
                color: '#fde047',
                velocity: { x: Math.cos(angle) * 9, y: Math.sin(angle) * 9 }
            });
        }

        window.addEventListener('click', e => {
            if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('skin-option')) {
                shoot(e.clientX, e.clientY);
            }
        });

        window.addEventListener('touchstart', e => {
            if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('skin-option')) {
                const touch = e.touches[0];
                shoot(touch.clientX, touch.clientY);
                player.x = touch.clientX;
                player.y = touch.clientY;
            }
        });

        function spawnEnemy() {
            if (gameState !== 'PLAYING') return;
            
            // Apparition des ennemis aléatoirement mais TOUJOURS à l'intérieur de la zone active
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.random() * zone.currentRadius;
            const x = zone.x + Math.cos(angle) * distance;
            const y = zone.y + Math.sin(angle) * distance;

            // Éviter de spawn directement sur le joueur
            if (Math.hypot(player.x - x, player.y - y) > 150) {
                enemies.push({
                    x: x,
                    y: y,
                    radius: 12,
                    color: '#ef4444',
                    speed: 1.5 + Math.random() * 1.2
                });
            }
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Mouvements Joueur
            if (keys['z'] || keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['q'] || keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Restreindre le joueur aux limites physiques de l'écran écran
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;

            // GESTION DE LA ZONE DE SÉCURITÉ
            if (zone.isShrinking) {
                if (zone.currentRadius > zone.targetRadius) {
                    zone.currentRadius -= zone.shrinkSpeed;
                } else {
                    zone.isShrinking = false;
                    zone.timer = 12; // Temps d'attente avant prochaine réduction
                    document.getElementById('zone-timer').innerText = "Rétrécit dans " + zone.timer + "s";
                }
            }

            // Vérifier si le joueur est hors zone
            const distToZoneCenter = Math.hypot(player.x - zone.x, player.y - zone.y);
            if (distToZoneCenter > zone.currentRadius) {
                player.hp -= 0.3; // Dégâts continus du gaz
                document.getElementById('hp-bar').style.background = '#ef4444';
                if (player.hp <= 0) {
                    triggerGameOver("Tu as succombé au gaz toxique hors de la zone !");
                }
            } else {
                document.getElementById('hp-bar').style.background = '#22c55e';
            }
            // Update graphique barre de vie
            document.getElementById('hp-bar').style.width = Math.max(0, player.hp) + '%';

            // Balles
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.velocity.x;
                bullet.y += bullet.velocity.y;
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Ennemis
            enemies.forEach((enemy, eIndex) => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                // Collision Balle / Ennemi
                bullets.forEach((bullet, bIndex) => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist - enemy.radius - bullet.radius < 1) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                });

                // Collision Ennemi / Joueur
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.radius < 1) {
                    triggerGameOver("Tu as été éliminé par les forces ennemies.");
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                // DESSIN DU GAZ DANGER (Tout l'extérieur de la zone)
                ctx.fillStyle = 'rgba(244, 63, 94, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Découpe de la zone de sécurité propre (Masque inverse)
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0, 0, 0, 1)';
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.currentRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalCompositeOperation = 'source-over';

                // Bordure de la zone de sécurité (Ligne bleue)
                ctx.strokeStyle = '#38bdf8';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(zone.x, zone.y, zone.currentRadius, 0, Math.PI * 2);
                ctx.stroke();

                // Joueur
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();

                // Balles
                bullets.forEach(bullet => {
                    ctx.fillStyle = bullet.color;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Ennemis
                enemies.forEach(enemy => {
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            zone.x = canvas.width / 2;
            zone.y = canvas.height / 2;
        });
    </script>
</body>
</html>
