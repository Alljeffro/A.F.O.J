<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.F.O.J - Battle Arena</title>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: white; }
        canvas { display: block; margin: 0 auto; background: #1e293b; }
        
        /* Interfaces UI Overlay */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15, 23, 42, 0.95); z-index: 10; }
        h1 { font-size: 48px; margin-bottom: 10px; letter-spacing: 4px; color: #38bdf8; text-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        p { color: #94a3b8; margin-bottom: 30px; }
        
        /* Grille des Skins */
        .skin-selector { display: flex; gap: 15px; margin-bottom: 40px; }
        .skin-option { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 4px solid transparent; transition: transform 0.2s, border-color 0.2s; }
        .skin-option:hover { transform: scale(1.1); }
        .skin-option.selected { border-color: #ffffff; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.6); }

        /* Boutons */
        .btn { padding: 15px 40px; font-size: 20px; font-weight: bold; color: white; background: #0284c7; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s, transform 0.1s; }
        .btn:hover { background: #0369a1; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        /* HUD en jeu */
        #hud { position: absolute; top: 20px; left: 20px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: none; pointer-events: none; }
        #hud span { color: #38bdf8; }

        /* Écran Game Over caché par défaut */
        #gameOverScreen { display: none; }
    </style>
</head>
<body>

    <!-- HUD en jeu -->
    <div id="hud">A.F.O.J | Éliminations: <span id="score">0</span></div>

    <!-- Menu Principal -->
    <div id="mainMenu" class="overlay">
        <h1>A.F.O.J</h1>
        <p>Sélectionne ton Skin et rejoins l'arène</p>
        
        <div class="skin-selector">
            <div class="skin-option selected" style="background: #38bdf8;" data-color="#38bdf8"></div>
            <div class="skin-option" style="background: #ec4899;" data-color="#ec4899"></div>
            <div class="skin-option" style="background: #22c55e;" data-color="#22c55e"></div>
            <div class="skin-option" style="background: #eab308;" data-color="#eab308"></div>
            <div class="skin-option" style="background: #a855f7;" data-color="#a855f7"></div>
        </div>

        <button class="btn" id="startBtn">LANCER LA PARTIE</button>
    </div>

    <!-- Écran Game Over -->
    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);">GAME OVER</h1>
        <p>Tu t'es fait éliminer par les bots.</p>
        <h2 style="margin-bottom: 40px;">Score final : <span id="finalScore" style="color: #eab308;">0</span></h2>
        <button class="btn" id="restartBtn">REJOUER</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // États du jeu : 'MENU', 'PLAYING', 'GAMEOVER'
        let gameState = 'MENU';
        let score = 0;
        let spawnInterval = null;

        // Le Joueur
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#38bdf8',
            speed: 4
        };

        // Tableaux de jeu
        let bullets = [];
        let enemies = [];

        // Gestion des touches clavier
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Sélection de Skin
        const skinOptions = document.querySelectorAll('.skin-option');
        skinOptions.forEach(option => {
            option.addEventListener('click', () => {
                skinOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                player.color = option.getAttribute('data-color');
            });
        });

        // Gestionnaires de boutons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', returnToMenu);

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            
            // Réinitialisation des données
            score = 0;
            document.getElementById('score').innerText = score;
            bullets = [];
            enemies = [];
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            gameState = 'PLAYING';

            // Lancement du spawn des ennemis
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEnemy, 1200);
        }

        function returnToMenu() {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('mainMenu').style.display = 'flex';
            gameState = 'MENU';
        }

        function shoot(targetX, targetY) {
            if (gameState !== 'PLAYING') return;
            const angle = Math.atan2(targetY - player.y, targetX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                radius: 4,
                color: '#fde047',
                velocity: {
                    x: Math.cos(angle) * 9,
                    y: Math.sin(angle) * 9
                }
            });
        }

        // Contrôles de tir (Souris + Tactile)
        window.addEventListener('click', e => {
            if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('skin-option')) {
                shoot(e.clientX, e.clientY);
            }
        });

        window.addEventListener('touchstart', e => {
            if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('skin-option')) {
                const touch = e.touches[0];
                shoot(touch.clientX, touch.clientY);
                player.x = touch.clientX;
                player.y = touch.clientY;
            }
        });

        function spawnEnemy() {
            if (gameState !== 'PLAYING') return;
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 : canvas.width;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 : canvas.height;
            }

            enemies.push({
                x: x,
                y: y,
                radius: 12,
                color: '#ef4444',
                speed: 1.8 + Math.random() * 1.5
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Déplacements
            if (keys['z'] || keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['q'] || keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Limites arène
            if (player.x < player.radius) player.x = player.radius;
            if (player.x > canvas.width - player.radius) player.x = canvas.width - player.radius;
            if (player.y < player.radius) player.y = player.radius;
            if (player.y > canvas.height - player.radius) player.y = canvas.height - player.radius;

            // Balles
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.velocity.x;
                bullet.y += bullet.velocity.y;
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }
            });

            // Ennemis
            enemies.forEach((enemy, eIndex) => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                // Collisions Balle / Ennemi
                bullets.forEach((bullet, bIndex) => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist - enemy.radius - bullet.radius < 1) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                });

                // Collision Ennemi / Joueur -> Game Over
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.radius < 1) {
                    gameState = 'GAMEOVER';
                    clearInterval(spawnInterval);
                    document.getElementById('hud').style.display = 'none';
                    document.getElementById('finalScore').innerText = score;
                    document.getElementById('gameOverScreen').style.display = 'flex';
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === 'PLAYING') {
                // Joueur
                ctx.fillStyle = player.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                ctx.fill();

                // Balles
                bullets.forEach(bullet => {
                    ctx.fillStyle = bullet.color;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                });

                // Ennemis
                enemies.forEach(enemy => {
                    ctx.fillStyle = enemy.color;
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
