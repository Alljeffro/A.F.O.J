<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A.F.O.J - Battle Ground</title>
    <style>
        body { margin: 0; padding: 0; background: #070a13; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; color: white; }
        canvas { display: block; margin: 0 auto; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(7, 10, 19, 0.95); z-index: 10; }
        h1 { font-size: 50px; margin-bottom: 5px; color: #f39c12; text-shadow: 0 0 20px rgba(243, 156, 18, 0.4); font-weight: 900; }
        p { color: #7f8c8d; margin-bottom: 30px; letter-spacing: 1px; }
        .btn { padding: 15px 45px; font-size: 20px; font-weight: bold; color: white; background: #e67e22; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 5px 0 #d35400; transition: all 0.1s; }
        .btn:hover { background: #d35400; }
        .btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d35400; }
        #hud { position: absolute; top: 20px; left: 20px; font-size: 18px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #hp-container { width: 180px; height: 12px; background: #34495e; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        #hp-bar { width: 100%; height: 100%; background: #2ecc71; }
        #gameOverScreen { display: none; }
    </style>
</head>
<body>

    <div id="hud">
        A.F.O.J REVOLUTION<br>
        Frags : <span id="score" style="color:#f1c40f">0</span>
        <div id="hp-container"><div id="hp-bar"></div></div>
    </div>

    <div id="mainMenu" class="overlay">
        <h1>A.F.O.J</h1>
        <p>BATTLEGROUNDS MOBILE & WEB</p>
        <button class="btn" id="startBtn">READY TO DROP</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #c0392b;">WIPED OUT</h1>
        <h2 style="margin-bottom: 30px;">Survivants éliminés. Score : <span id="finalScore" style="color: #f1c40f;">0</span></h2>
        <button class="btn" id="restartBtn">RE-DEPLOY</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameState = 'MENU';
        let score = 0;
        let spawnInterval = null;
        let mouseX = 0, mouseY = 0;

        // --- CHARGEMENT DES ASSETS GRAPHIQUES (REAL TEXTURES) ---
        const assets = {
            terrain: new Image(),
            soldier: new Image(),
            bot: new Image()
        };

        // Images de remplacement orientées gaming/militaires
        assets.terrain.src = 'https://img.freepik.com/vecteurs-libre/texture-sol-herbe-haut-jeu_1057-35711.jpg'; // Texture de terrain de combat (Herbe/Terre)
        assets.soldier.src = 'https://cdn-icons-png.flaticon.com/512/8204/8204365.png'; // Commando équipé d'une arme (Vue du dessus)
        assets.bot.src = 'https://cdn-icons-png.flaticon.com/512/8204/8204390.png'; // Ennemi mercenaire armé

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 45, // Taille ajustée pour l'image du personnage
            speed: 5,
            hp: 100,
            angle: 0
        };

        let bullets = [];
        let enemies = [];
        const keys = {};

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        
        window.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            score = 0;
            player.hp = 100;
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            bullets = [];
            enemies = [];
            document.getElementById('score').innerText = score;
            document.getElementById('hp-bar').style.width = '100%';
            
            gameState = 'PLAYING';
            if (spawnInterval) clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEnemy, 1000);
        }

        function shoot(targetX, targetY) {
            if (gameState !== 'PLAYING') return;
            const angle = Math.atan2(targetY - player.y, targetX - player.x);
            bullets.push({
                x: player.x,
                y: player.y,
                radius: 4,
                color: '#f39c12',
                velocity: { x: Math.cos(angle) * 12, y: Math.sin(angle) * 12 }
            });
        }

        window.addEventListener('click', e => {
            if(e.target.tagName !== 'BUTTON') shoot(e.clientX, e.clientY);
        });

        window.addEventListener('touchstart', e => {
            if(e.target.tagName !== 'BUTTON') {
                const touch = e.touches[0];
                shoot(touch.clientX, touch.clientY);
                player.x = touch.clientX;
                player.y = touch.clientY;
            }
        });

        function spawnEnemy() {
            if (gameState !== 'PLAYING') return;
            const angle = Math.random() * Math.PI * 2;
            const distance = Math.max(canvas.width, canvas.height) * 0.6;
            enemies.push({
                x: player.x + Math.cos(angle) * distance,
                y: player.y + Math.sin(angle) * distance,
                size: 40,
                speed: 2 + Math.random() * 1.5,
                angle: 0
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            // Déplacement du Commando
            if (keys['z'] || keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['q'] || keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Rotation du joueur vers la cible/souris (comme Free Fire pour viser)
            player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

            // Balles
            bullets.forEach((bullet, bIndex) => {
                bullet.x += bullet.velocity.x;
                bullet.y += bullet.velocity.y;
                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(bIndex, 1);
                }
            });

            // Ennemis (IA traqueuse)
            enemies.forEach((enemy, eIndex) => {
                enemy.angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(enemy.angle) * enemy.speed;
                enemy.y += Math.sin(enemy.angle) * enemy.speed;

                // Collisions Balles / Ennemis
                bullets.forEach((bullet, bIndex) => {
                    const dist = Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y);
                    if (dist < enemy.size / 2) {
                        enemies.splice(eIndex, 1);
                        bullets.splice(bIndex, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                });

                // Collision Ennemi / Joueur
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer < (player.size / 2 + enemy.size / 2)) {
                    player.hp -= 0.5;
                    document.getElementById('hp-bar').style.width = player.hp + '%';
                    if (player.hp <= 0) {
                        gameState = 'GAMEOVER';
                        clearInterval(spawnInterval);
                        document.getElementById('finalScore').innerText = score;
                        document.getElementById('gameOverScreen').style.display = 'flex';
                    }
                }
            });
        }

        function draw() {
            // 1. DESSINER LE TERRAIN (Répétition de la texture du champ de bataille)
            if (assets.terrain.complete) {
                const pattern = ctx.createPattern(assets.terrain, 'repeat');
                ctx.fillStyle = pattern;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            if (gameState === 'PLAYING') {
                // 2. DESSINER LES BALLES
                bullets.forEach(bullet => {
                    ctx.fillStyle = bullet.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#f39c12';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0; // Réinitialisation
                });

                // 3. DESSINER LE JOUEUR (Avec rotation de son corps et de son arme)
                if (assets.soldier.complete) {
                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(player.angle + Math.PI / 2); // Ajustement de l'orientation de l'image
                    ctx.drawImage(assets.soldier, -player.size / 2, -player.size / 2, player.size, player.size);
                    ctx.restore();
                }

                // 4. DESSINER LES ENNEMIS ARMÉS
                enemies.forEach(enemy => {
                    if (assets.bot.complete) {
                        ctx.save();
                        ctx.translate(enemy.x, enemy.y);
                        ctx.rotate(enemy.angle + Math.PI / 2);
                        ctx.drawImage(assets.bot, -enemy.size / 2, -enemy.size / 2, enemy.size, enemy.size);
                        ctx.restore();
                    }
                });
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
